<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Session ID</title>
    <style>
        :root {
            --navy: #0a2540;
            --muted: #425466;
            --line: #e6ebf1;
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --surface: #ffffff;
            --soft: #f6f9fc;
            --success: #0f9f6e;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 380px;
            min-height: 430px;
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--soft);
            color: var(--navy);
        }

        .shell {
            padding: 18px;
        }

        .card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--surface);
            box-shadow: 0 20px 50px rgba(10, 37, 64, 0.14);
        }

        .hero {
            padding: 22px;
            background:
                radial-gradient(circle at top right, rgba(99, 91, 255, 0.24), transparent 34%),
                linear-gradient(135deg, #0a2540 0%, #183b5b 100%);
            color: white;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .logo {
            display: block;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 3px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: #a5b4fc;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: 25px;
            line-height: 1.05;
            letter-spacing: -0.05em;
        }

        .content {
            padding: 20px 22px 22px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px;
            border-radius: 999px;
            background: #eef0ff;
            color: var(--primary);
            font-size: 12px;
            font-weight: 800;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        #sessionId {
            width: 100%;
            height: 118px;
            resize: none;
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 14px;
            outline: none;
            background: var(--soft);
            color: var(--navy);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            line-height: 1.55;
        }

        #sessionId:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            height: 42px;
            border: 0;
            border-radius: 12px;
            cursor: pointer;
            font: inherit;
            font-size: 13px;
            font-weight: 800;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        #copyBtn {
            background: var(--primary);
            color: white;
            box-shadow: 0 12px 24px rgba(99, 91, 255, 0.24);
        }

        #copyBtn:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        #copyBtn:disabled {
            cursor: not-allowed;
            opacity: 0.48;
            box-shadow: none;
        }

        #refreshBtn {
            background: #eef0ff;
            color: var(--primary);
        }

        #status {
            min-height: 20px;
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        #status.success {
            color: var(--success);
        }

        #status.error {
            color: var(--danger);
        }

        .footer-note {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 11px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="card">
            <div class="hero">
                <div class="brand">
                    <div class="logo"><img src="icon-48.png" alt="Instagram DM Deleter"></div>
                    <span>Instagram DM Deleter</span>
                </div>
                <p class="eyebrow">Session Connector</p>
                <h1>Copy your Instagram session for Instagram DM Deleter.</h1>
            </div>

            <div class="content">
                <div class="status-row">
                    <span class="status-pill"><span class="status-dot"></span><span id="sessionState">Checking</span></span>
                </div>

                <label class="label" for="sessionId">Instagram Session ID</label>
                <textarea id="sessionId" readonly placeholder="Session ID will appear here after detection."></textarea>

                <div class="actions">
                    <button id="copyBtn" disabled>Copy session</button>
                    <button id="refreshBtn">Refresh</button>
                </div>

                <p id="status">Open Instagram and log in if no session is detected.</p>
                <p class="footer-note">No external services are used. This extension only reads the Instagram cookie available in your browser and lets you copy it manually.</p>
            </div>
        </section>
    </main>
    <script src="popup.js"></script>
</body>
</html>
